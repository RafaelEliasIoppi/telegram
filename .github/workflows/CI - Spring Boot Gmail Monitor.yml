name: CI - Gmail Monitor Action

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions: 
  contents: write

jobs:
  run-gmail-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ensure subject file exists
        run: |
          mkdir -p teste
          touch teste/ultimo_assunto.txt

      - name: Build application
        run: mvn -B -f teste/pom.xml clean package -DskipTests

      - name: Run Telegram Monitor
        env:
          # Mapeamento exato para o @Value("${telegram.bot.token}")
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Mapeamento exato para o @Value("${telegram.chat.id}")
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          
       
       
        run: |
          mvn -B -f teste/pom.xml compile exec:java \
            -Dexec.mainClass="telegram.teste.TesteApplication" \
            -Dspring.profiles.active=ci
      - name: Commit updated subject file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add teste/ultimo_assunto.txt
          git diff --cached --quiet || git commit -m "Atualiza ultimo_assunto.txt [skip ci]"
          git push