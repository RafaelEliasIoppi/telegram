# Production profile - PostgreSQL
# Accepts either:
#   (a) a single JDBC URL via DATABASE_URL (docker-compose pattern), or
#   (b) Render-style discrete vars PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:botdb}}
spring.datasource.driver-class-name=org.postgresql.Driver
# Credenciais do banco SEM default: o boot falha claramente se PGUSER/PGPASSWORD
# (ou DATABASE_USER/DATABASE_PASSWORD) não forem fornecidos via variável de ambiente.
spring.datasource.username=${DATABASE_USER:${PGUSER}}
spring.datasource.password=${DATABASE_PASSWORD:${PGPASSWORD}}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# Credenciais da UI SEM default em produção: exigem APP_USERNAME/APP_PASSWORD.
# Sem essas variáveis o boot falha em vez de subir com a senha de desenvolvimento.
app.security.username=${APP_USERNAME}
app.security.password=${APP_PASSWORD}
