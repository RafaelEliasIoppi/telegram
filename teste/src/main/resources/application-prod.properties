# Production profile - PostgreSQL
# Accepts either:
#   (a) a single JDBC URL via DATABASE_URL (docker-compose pattern), or
#   (b) Render-style discrete vars PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:botdb}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USER:${PGUSER:postgres}}
spring.datasource.password=${DATABASE_PASSWORD:${PGPASSWORD:postgres}}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false
