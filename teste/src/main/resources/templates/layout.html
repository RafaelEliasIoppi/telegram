<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
      th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle != null ? pageTitle + ' — Bot Hub' : 'Bot Hub'}">Bot Hub</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-app: #f5f7fb;
            --nivel-critico: #dc3545;
            --nivel-aviso: #c25e00;   /* laranja escurecido p/ contraste com texto branco */
            --nivel-info: #0d6efd;
        }
        body { min-height: 100vh; display: flex; flex-direction: column; background-color: var(--bg-app); }
        main { flex: 1; }

        /* Cabeçalho de página consistente */
        main > div h1 { font-size: 1.75rem; font-weight: 600; }
        main > div h1 .bi { color: #495057; }

        /* Cores de texto por nível */
        .nivel-CRITICO { color: var(--nivel-critico); font-weight: 600; }
        .nivel-AVISO   { color: var(--nivel-aviso);   font-weight: 600; }
        .nivel-INFO    { color: var(--nivel-info);    font-weight: 600; }

        /* Badges de nível — contraste AA com texto branco */
        .badge-CRITICO { background-color: var(--nivel-critico); color: #fff; }
        .badge-AVISO   { background-color: var(--nivel-aviso);   color: #fff; }
        .badge-INFO    { background-color: var(--nivel-info);    color: #fff; }
        .badge-CRITICO, .badge-AVISO, .badge-INFO {
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 0.35em 0.6em;
        }

        .footer { margin-top: auto; }

        .card-stat h2 { font-size: 2rem; margin: 0; }
        .card-stat .stat-icon { font-size: 1.6rem; opacity: 0.85; }

        /* Cards: leve elevação no hover para os clicáveis/principais */
        .card { border-color: rgba(0,0,0,.075); }
        .card.shadow-sm { transition: box-shadow 0.15s ease, transform 0.15s ease; }
        .card.shadow-sm:hover { box-shadow: 0 0.35rem 0.9rem rgba(0,0,0,.10) !important; }

        /* Cabeçalhos de card brancos com borda discreta */
        .card-header.bg-white { border-bottom: 1px solid rgba(0,0,0,.075); }

        /* Tabelas mais legíveis */
        .table thead th {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #6c757d;
            border-bottom-width: 2px;
        }
        .table > :not(caption) > * > * { vertical-align: middle; }

        /* Truncate responsivo — não estoura em telas pequenas */
        .truncate {
            max-width: 480px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @media (max-width: 992px) {
            .truncate { max-width: 320px; }
        }
        @media (max-width: 576px) {
            .truncate { max-width: 180px; }
        }

        .navbar .nav-link.active { color: #ffc107 !important; font-weight: 600; }
        .navbar .nav-link { transition: color 0.15s ease; }

        .source-row { transition: background-color 0.15s ease; }
        .source-row:hover { background-color: #f8f9fa; }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
        }
        .status-pill.ok { background-color: #d1e7dd; color: #0a3622; }
        .status-pill.warn { background-color: #f8d7da; color: #58151c; }

        .quick-action {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: flex-start;
        }
        .stat-accent {
            border-left: 4px solid transparent;
        }

        /* Botões com leve transição */
        .btn { transition: background-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease; }

        /* Alertas flash: ícone alinhado e canto arredondado consistente */
        .alert .bi { vertical-align: -0.125em; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="bi bi-robot"></i> Bot Hub
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false"
                aria-label="Alternar navegação">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto"
                th:with="uri=${#httpServletRequest != null ? #httpServletRequest.requestURI : ''}">
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${#strings.startsWith(uri,'/dashboard')} ? 'active' : ''"
                       th:href="@{/dashboard}">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${#strings.startsWith(uri,'/historico')} ? 'active' : ''"
                       th:href="@{/historico}">
                        <i class="bi bi-clock-history"></i> Histórico
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${#strings.startsWith(uri,'/chats')} ? 'active' : ''"
                       th:href="@{/chats}">
                        <i class="bi bi-chat-dots"></i> Chats
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${#strings.startsWith(uri,'/fontes')} ? 'active' : ''"
                       th:href="@{/fontes}">
                        <i class="bi bi-broadcast"></i> Fontes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${#strings.startsWith(uri,'/filtros')} ? 'active' : ''"
                       th:href="@{/filtros}">
                        <i class="bi bi-funnel"></i> Filtros
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${#strings.startsWith(uri,'/gmail')} ? 'active' : ''"
                       th:href="@{/gmail}">
                        <i class="bi bi-envelope"></i> Gmail
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${#strings.startsWith(uri,'/bot')} ? 'active' : ''"
                       th:href="@{/bot}">
                        <i class="bi bi-gear"></i> Bot
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${#strings.startsWith(uri,'/teste')} ? 'active' : ''"
                       th:href="@{/teste}">
                        <i class="bi bi-send"></i> Testar envio
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${#strings.startsWith(uri,'/ajuda')} ? 'active' : ''"
                       th:href="@{/ajuda}">
                        <i class="bi bi-question-circle"></i> Ajuda
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item d-flex align-items-center" sec:authorize="isAuthenticated()">
                    <span class="navbar-text me-3">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name">user</span>
                    </span>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm">
                            <i class="bi bi-box-arrow-right"></i> Sair
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container mt-4">
    <div th:replace="${content}">
        <p>Conteúdo da página.</p>
    </div>
</main>

<footer class="footer py-3 bg-light text-center border-top">
    <span class="text-muted small">
        <i class="bi bi-robot"></i> Telegram Bot Hub
        <span class="mx-2">•</span>
        <span>v1.0</span>
    </span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
