<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Bot Hub</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center"
     style="min-height: 100vh;">
    <div class="card shadow" style="width: 360px;">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">
                <i class="bi bi-robot"></i> Bot Hub
            </h3>

            <div th:if="${param.error}" class="alert alert-danger py-2">
                <i class="bi bi-exclamation-triangle"></i> Credenciais inválidas.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2">
                <i class="bi bi-check-circle"></i> Logout realizado.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuário</label>
                    <input type="text" id="username" name="username"
                           class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <div class="input-group">
                        <input type="password" id="password" name="password"
                               class="form-control" required
                               autocomplete="current-password">
                        <button type="button" class="btn btn-outline-secondary"
                                id="togglePassword"
                                aria-label="Mostrar/ocultar senha"
                                title="Mostrar/ocultar senha">
                            <i class="bi bi-eye" id="togglePasswordIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Entrar
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        var btn = document.getElementById('togglePassword');
        var input = document.getElementById('password');
        var icon = document.getElementById('togglePasswordIcon');
        if (!btn || !input || !icon) return;
        btn.addEventListener('click', function () {
            var hidden = input.type === 'password';
            input.type = hidden ? 'text' : 'password';
            icon.classList.toggle('bi-eye', !hidden);
            icon.classList.toggle('bi-eye-slash', hidden);
            input.focus();
        });
    })();
</script>
</body>
</html>
