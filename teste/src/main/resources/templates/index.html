<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Telegram Bot Hub</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Telegram Hub</a>
    </div>
</nav>
<div class="container py-4">
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Enviar Texto</h5>
                    <form th:action="@{/enviar}" method="post">
                        <div class="mb-2"><input class="form-control" type="text" name="titulo" placeholder="Título" required></div>
                        <div class="mb-2"><textarea class="form-control" name="conteudo" placeholder="Mensagem" rows="4" required></textarea></div>
                        <button class="btn btn-primary w-100" type="submit">Enviar Texto</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Upload de Foto</h5>
                    <form th:action="@{/enviar-foto-texto}" method="post" enctype="multipart/form-data">
                        <div class="mb-2"><input class="form-control" type="file" name="foto" required></div>
                        <div class="mb-2"><input class="form-control" type="text" name="titulo" placeholder="Título"></div>
                        <div class="mb-2"><textarea class="form-control" name="conteudo" placeholder="Legenda" rows="2"></textarea></div>
                        <button class="btn btn-outline-primary w-100" type="submit">Enviar Foto</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">CNN Internacional</h5>
                    <form th:action="@{/enviar-noticia-cnn}" method="post">
                        <div class="input-group mb-2">
                            <input class="form-control" type="text" name="palavra" placeholder="Ex: China, Trump..." required>
                            <button class="btn btn-danger" type="submit">Buscar e Enviar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Automático / Monitor</h5>
                    <div class="mb-2">
                        <form th:action="@{/executar-busca-automatica}" method="post" style="display:inline-block; width:100%">
                            <button class="btn btn-secondary w-100" type="submit">Executar Busca Automática</button>
                        </form>
                    </div>
                    <div class="d-flex gap-2">
                        <a class="btn btn-warning flex-fill" href="/defesacivil">Último Alerta</a>
                        <a class="btn btn-outline-primary flex-fill" href="/defesacivil/candidatos">Preview Candidatos</a>
                    </div>
                    <hr>
                    <p class="mb-1"><strong>Ativado:</strong> <span th:text="${monitorEnabled}">false</span></p>
                    <p class="mb-1"><strong>Palavras:</strong> <span th:text="${monitorKeywords}">alerta,aviso</span></p>
                    <p class="mb-0 text-muted" style="font-size:.9rem">Configurações via <em>.env</em> — edite o arquivo e reinicie.</p>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body d-flex align-items-center justify-content-between">
                    <div>
                        <h6 class="mb-1">Teste</h6>
                        <p class="mb-0 text-muted">Envie uma mensagem de teste para validar o envio.</p>
                    </div>
                    <form th:action="@{/enviar-teste}" method="post">
                        <button class="btn btn-success" type="submit">Enviar Teste</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div th:if="${mensagem}" class="alert alert-info mt-2" th:text="${mensagem}"></div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
