<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Buscar E-mails por Assunto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f4f4f4, #e0eafc);
            margin: 0;
            padding: 40px;
        }
        .container {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #0078d7;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #0078d7;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #0078d7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background: #005fa3;
        }
        .resultado {
            margin-top: 20px;
            padding: 15px;
            background: #f0f8ff;
            border: 1px solid #0078d7;
            border-radius: 6px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📧 Buscar E-mails por Assunto</h2>

        <!-- Formulário único para buscar e-mails por assunto -->
        <form action="/buscar-gmail-assunto" method="post">
            <label for="assunto">Assunto do e-mail:</label>
            <input type="text" id="assunto" name="assunto" placeholder="Digite o assunto para buscar" required>
            <button type="submit">🔍 Buscar</button>
        </form>

    <p th:if="${status}" th:text="${status}" style="text-align:center; font-weight:bold; color:#0078d7;"></p>

<div class="resultado" th:if="${not #lists.isEmpty(mensagens)}">
    <ul style="list-style: none; padding: 0;">
        <li th:each="msg : ${mensagens}" style="margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px;">
            <strong style="color: #0078d7;">De:</strong> <span th:text="${msg.remetente}"></span><br>
            <strong>Assunto:</strong> <span th:text="${msg.assunto}"></span><br>
            <small style="color: #666;">📅 Data: <span th:text="${msg.data}"></span></small>
        </li>
    </ul>
</div>
    </div>
</body>
</html>
