<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Envio para Telegram</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f9f9f9; }
        h1 { color: #2c3e50; }
        form { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; }
        button { margin-top: 15px; padding: 10px 20px; background: #3498db; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2980b9; }
        .mensagem { margin-top: 20px; padding: 10px; background: #eafaf1; border: 1px solid #2ecc71; border-radius: 4px; color: #2c3e50; }
    </style>
</head>
<body>
    <h1>Enviar para Telegram</h1>

    <!-- Formulário para enviar só texto -->
    <form action="/enviar" method="post">
        <h2>Enviar Mensagem</h2>
        <label for="titulo">Título:</label>
        <input type="text" id="titulo" name="titulo" required>

        <label for="conteudo">Conteúdo:</label>
        <textarea id="conteudo" name="conteudo" rows="4" required></textarea>

        <label for="destinatario">Chat ID (opcional):</label>
        <input type="text" id="destinatario" name="destinatario">

        <button type="submit">Enviar Mensagem</button>
    </form>

    <!-- Formulário para enviar foto + texto (upload local) -->
    <form action="/enviar-foto-texto" method="post" enctype="multipart/form-data">
        <h2>Enviar Foto + Texto</h2>
        <label for="foto">Selecione a Foto:</label>
        <input type="file" id="foto" name="foto" accept="image/*" required>

        <label for="tituloFoto">Título:</label>
        <input type="text" id="tituloFoto" name="titulo" required>

        <label for="conteudoFoto">Conteúdo:</label>
        <textarea id="conteudoFoto" name="conteudo" rows="4" required></textarea>

        <label for="destinatarioFoto">Chat ID (opcional):</label>
        <input type="text" id="destinatarioFoto" name="destinatario">

        <button type="submit">Enviar Foto + Texto</button>
    </form>

    <!-- Mensagem de status -->
    <div class="mensagem">
        <p th:text="${mensagem}"></p>
        <p th:text="${status}"></p>
    </div>
</body>
</html>
