<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mensagem enviada — Bot Hub</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f5f7fb; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center"
         style="min-height: 100vh;">
        <div class="card shadow-sm text-center" style="max-width: 480px;">
            <div class="card-body p-5">
                <div class="display-5 text-success mb-3">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <h2 class="h4 mb-2">Mensagem enviada com sucesso!</h2>
                <p class="text-muted">Sua mensagem foi entregue ao destinatário no Telegram.</p>
                <a href="/dashboard" class="btn btn-primary mt-2">
                    <i class="bi bi-arrow-left"></i> Voltar ao painel
                </a>
            </div>
        </div>
    </div>

</html>
