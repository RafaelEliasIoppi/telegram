<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alertas Defesa Civil</title>
    <style>
        body { font-family: sans-serif; background:#f7fbff; padding:20px; }
        .card { background:white; padding:20px; border-radius:8px; max-width:800px; margin:20px auto; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
        pre { white-space:pre-wrap; word-wrap:break-word; }
        a.button { display:inline-block; margin-top:12px; padding:8px 12px; background:#0088cc; color:white; text-decoration:none; border-radius:6px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>⚠️ Último alerta registrado</h2>
        <div th:if="${alerta == null || alerta == ''}">
            <p>Nenhum alerta salvo ainda.</p>
        </div>
        <div th:if="${alerta != null && alerta != ''}">
            <pre th:text="${alerta}"></pre>
        </div>
        <form action="/defesacivil/verificar-agora" method="post" style="margin-top:12px;">
            <button type="submit">Verificar Agora</button>
        </form>
        <p><a href="/" class="button">Voltar</a></p>
    </div>
</body>
</html>
