<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Alertas Defesa Civil — Bot Hub</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f5f7fb; }
    </style>
</head>
<body>
    <div class="container py-4" style="max-width: 820px;">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="bi bi-shield-exclamation"></i> Último alerta registrado</h5>
            </div>
            <div class="card-body">
                <div th:if="${alerta == null || alerta == ''}">
                    <p class="text-muted mb-0">Nenhum alerta salvo ainda.</p>
                </div>
                <div th:if="${alerta != null && alerta != ''}">
                    <pre class="bg-light p-3 rounded mb-0"
                         style="white-space:pre-wrap; word-break:break-word;"
                         th:text="${alerta}"></pre>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <form th:action="@{/defesacivil/verificar-agora}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-arrow-clockwise"></i> Verificar agora
                        </button>
                    </form>
                    <a href="/dashboard" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Voltar
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
