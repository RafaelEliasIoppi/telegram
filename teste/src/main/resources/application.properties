spring.application.name=telegram-bot-hub
server.port=3000

# Timezone padrão da aplicação
spring.jackson.time-zone=America/Sao_Paulo
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# Upload de anexos para /teste (até 20MB)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Telegram
spring.config.import=optional:file:.env[.properties]
telegram.bot.token=${TELEGRAM_BOT_TOKEN:changeme}
telegram.chat.ids=${TELEGRAM_CHAT_IDS:${TELEGRAM_CHAT_ID:0}}
telegram.webhook.url=${TELEGRAM_WEBHOOK_URL:}
telegram.webhook.enabled=${TELEGRAM_WEBHOOK_ENABLED:false}
# Token secreto para validar updates do webhook (header X-Telegram-Bot-Api-Secret-Token).
# Vazio = validação desativada (compatível). Configure TELEGRAM_WEBHOOK_SECRET em produção.
telegram.webhook.secret=${TELEGRAM_WEBHOOK_SECRET:}

# Database (dev: H2)
# AUTO_SERVER=TRUE: modo misto — evita o erro "Database may be already in use"
# quando há mais de uma conexão/instância (ex.: app + console, ou start duplo).
spring.datasource.url=jdbc:h2:file:./data/botdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Monitor Defesa Civil
defesacivil.url=https://www.defesacivil.rs.gov.br/
defesacivil.fixedRate=1800000

# Intervalo global do scheduler (ms). Default 30 min. Override via MONITOR_FIXED_RATE
monitor.fixedRate=${MONITOR_FIXED_RATE:1800000}
defesacivil.enabled=true

# Monitor INMET
inmet.enabled=true
inmet.fixedRate=1800000

# Monitor Gmail (Urgência Renal)
gmail.enabled=${GMAIL_ENABLED:true}
gmail.imap.host=${GMAIL_IMAP_HOST:imap.gmail.com}
gmail.imap.port=${GMAIL_IMAP_PORT:993}
gmail.user=${GMAIL_USER:}
gmail.app.password=${GMAIL_APP_PASSWORD:}
gmail.subject.filter=${GMAIL_SUBJECT_FILTER:Notificação de novo e-mail – Urgência Renal}
gmail.fixedRate=${GMAIL_FIXED_RATE:300000}

# Security (UI web)
app.security.username=${APP_USERNAME:admin}
app.security.password=${APP_PASSWORD:admin123}

# Logging
logging.level.telegram.bot=INFO
